# TradesPay AI - Nginx Configuration Template

# 1. API - api.srdgintel.com
server {
    listen 80;
    server_name api.srdgintel.com;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }
}

# 2. APP/Frontend - tradespay.srdgintel.com
server {
    listen 80;
    server_name tradespay.srdgintel.com;

    root /var/www/html/app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dedicated path for Privacy Policy if needed
    location /privacy {
        alias /var/www/html/privacy;
        index index.html;
    }

    # Assets & Web Manifest
    location ~* \.(?:manifest|json|png|jpg|jpeg|gif|ico|svg|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
